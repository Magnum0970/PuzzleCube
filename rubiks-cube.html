<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rubik's Cube — Nature Landscapes</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, sans-serif;
    background: #1a1a2e;
    color: #eee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 24px;
  }
  h1 { font-size: 18px; font-weight: 500; letter-spacing: 0.04em; opacity: 0.85; }
  #hint { font-size: 12px; opacity: 0.5; text-align: center; line-height: 1.8; }
  #scene {
    width: 360px; height: 360px;
    perspective: 900px;
    cursor: grab;
    touch-action: none;
  }
  #cube {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transform: rotateX(-30deg) rotateY(30deg);
  }
  .face {
    position: absolute;
    width: 160px; height: 160px;
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 4px; padding: 4px;
    background: #111;
    border: 4px solid #111;
  }
  .cell { border-radius: 3px; background-size: 300% 300%; background-repeat: no-repeat; }
  #btn-row { display: flex; gap: 8px; }
  button {
    font-size: 13px; padding: 6px 20px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: #eee; cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: rgba(255,255,255,0.16); }
  #status { font-size: 13px; opacity: 0.45; height: 18px; letter-spacing: 0.05em; }
</style>
</head>
<body>
<h1>Rubik's Cube — Nature Landscapes</h1>
<div id="hint">Drag <strong>on a face</strong> to twist · Drag <strong>outside</strong> to orbit</div>
<div id="scene"><div id="cube"></div></div>
<div id="btn-row">
  <button id="btn-shuffle">Shuffle</button>
  <button id="btn-reset">Reset</button>
</div>
<div id="status"></div>

<script>
(function(){

// ── Paint landscape scenes onto 300×300 canvases ──────────────────────────
function paintDesert(ctx, w, h) {
  // Sky — deep blue to warm orange at horizon
  let g = ctx.createLinearGradient(0,0,0,h*0.55);
  g.addColorStop(0,'#1a3a5c'); g.addColorStop(1,'#e8803a');
  ctx.fillStyle = g; ctx.fillRect(0,0,w,h*0.55);
  // Sun
  ctx.beginPath(); ctx.arc(w*0.72, h*0.18, h*0.07, 0, Math.PI*2);
  ctx.fillStyle='#ffd060'; ctx.fill();
  // Distant mesas
  ctx.fillStyle='#8b3a1a';
  ctx.beginPath(); ctx.moveTo(0,h*0.5); ctx.lineTo(w*0.15,h*0.32);
  ctx.lineTo(w*0.28,h*0.32); ctx.lineTo(w*0.35,h*0.5); ctx.fill();
  ctx.fillStyle='#a0491f';
  ctx.beginPath(); ctx.moveTo(w*0.5,h*0.5); ctx.lineTo(w*0.62,h*0.28);
  ctx.lineTo(w*0.78,h*0.28); ctx.lineTo(w*0.9,h*0.5); ctx.fill();
  // Sand ground
  g = ctx.createLinearGradient(0,h*0.5,0,h);
  g.addColorStop(0,'#c8843a'); g.addColorStop(1,'#a06020');
  ctx.fillStyle=g; ctx.fillRect(0,h*0.5,w,h*0.5);
  // Sand ripples
  ctx.strokeStyle='rgba(255,200,100,0.25)'; ctx.lineWidth=1.5;
  for(let i=0;i<6;i++){
    ctx.beginPath(); ctx.moveTo(0,h*(0.58+i*0.07));
    ctx.bezierCurveTo(w*0.3,h*(0.56+i*0.07),w*0.7,h*(0.62+i*0.07),w,h*(0.59+i*0.07));
    ctx.stroke();
  }
  // Cactus
  function cactus(x,y,s){
    ctx.fillStyle='#2d6e2d';
    ctx.fillRect(x-s*0.12,y-s,s*0.24,s);
    ctx.fillRect(x-s*0.45,y-s*0.6,s*0.33,s*0.18);
    ctx.fillRect(x+s*0.12,y-s*0.45,s*0.33,s*0.18);
    ctx.fillRect(x-s*0.45,y-s*0.6,s*0.12,s*0.32);
    ctx.fillRect(x+s*0.33,y-s*0.45,s*0.12,s*0.32);
  }
  cactus(w*0.2, h*0.85, h*0.22);
  cactus(w*0.75, h*0.9, h*0.18);
}

function paintBeach(ctx, w, h) {
  // Deep ocean sky
  let g = ctx.createLinearGradient(0,0,0,h*0.45);
  g.addColorStop(0,'#0a3d6b'); g.addColorStop(1,'#5bb8e8');
  ctx.fillStyle=g; ctx.fillRect(0,0,w,h*0.45);
  // Sun
  ctx.beginPath(); ctx.arc(w*0.5,h*0.12,h*0.06,0,Math.PI*2);
  ctx.fillStyle='#fff9c0'; ctx.fill();
  // Sunbeams
  ctx.strokeStyle='rgba(255,249,150,0.15)'; ctx.lineWidth=6;
  for(let a=0;a<12;a++){
    ctx.beginPath();
    ctx.moveTo(w*0.5,h*0.12);
    const ang = a/12*Math.PI*2;
    ctx.lineTo(w*0.5+Math.cos(ang)*h*0.25, h*0.12+Math.sin(ang)*h*0.25);
    ctx.stroke();
  }
  // Ocean
  g = ctx.createLinearGradient(0,h*0.42,0,h*0.68);
  g.addColorStop(0,'#1a9ad0'); g.addColorStop(1,'#0a5a8a');
  ctx.fillStyle=g; ctx.fillRect(0,h*0.42,w,h*0.28);
  // Wave highlights
  ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=2;
  for(let i=0;i<4;i++){
    ctx.beginPath(); ctx.moveTo(0,h*(0.46+i*0.055));
    ctx.bezierCurveTo(w*0.25,h*(0.44+i*0.055),w*0.75,h*(0.49+i*0.055),w,h*(0.46+i*0.055));
    ctx.stroke();
  }
  // Sand
  g = ctx.createLinearGradient(0,h*0.68,0,h);
  g.addColorStop(0,'#f0d890'); g.addColorStop(1,'#c8a850');
  ctx.fillStyle=g; ctx.fillRect(0,h*0.68,w,h*0.32);
  // Wet sand shine
  ctx.fillStyle='rgba(255,255,255,0.12)';
  ctx.fillRect(0,h*0.68,w,h*0.05);
  // Palm tree
  ctx.fillStyle='#5a3a10'; ctx.save();
  ctx.translate(w*0.8,h); ctx.rotate(-0.15);
  ctx.fillRect(-6,0,12,-h*0.38); ctx.restore();
  // Palm leaves
  const lx=w*0.8-Math.sin(0.15)*h*0.38, ly=h-Math.cos(0.15)*h*0.38;
  ctx.strokeStyle='#2d7a20'; ctx.lineWidth=4;
  [[0,-40],[30,-30],[50,-10],[40,10],[-30,-28],[-50,-8],[-35,12]].forEach(([dx,dy])=>{
    ctx.beginPath(); ctx.moveTo(lx,ly);
    ctx.quadraticCurveTo(lx+dx*0.5,ly+dy*0.3,lx+dx,ly+dy);
    ctx.stroke();
  });
}

function paintSummerMountains(ctx, w, h) {
  // Sky
  let g = ctx.createLinearGradient(0,0,0,h*0.5);
  g.addColorStop(0,'#2a7abf'); g.addColorStop(1,'#a8d8f0');
  ctx.fillStyle=g; ctx.fillRect(0,0,w,h*0.5);
  // Clouds
  function cloud(x,y,s){
    ctx.fillStyle='rgba(255,255,255,0.9)';
    [[0,0,s],[s*0.5,-s*0.3,s*0.7],[-s*0.5,-s*0.2,s*0.65],[s*1.0,-s*0.1,s*0.6]].forEach(([dx,dy,r])=>{
      ctx.beginPath(); ctx.arc(x+dx,y+dy,r,0,Math.PI*2); ctx.fill();
    });
  }
  cloud(w*0.2,h*0.12,h*0.055); cloud(w*0.65,h*0.08,h*0.07);
  // Far mountains — blue-grey
  ctx.fillStyle='#7a9ab0';
  ctx.beginPath(); ctx.moveTo(0,h*0.55);
  ctx.lineTo(w*0.1,h*0.28); ctx.lineTo(w*0.25,h*0.38);
  ctx.lineTo(w*0.4,h*0.2); ctx.lineTo(w*0.55,h*0.35);
  ctx.lineTo(w*0.7,h*0.18); ctx.lineTo(w*0.85,h*0.32);
  ctx.lineTo(w,h*0.22); ctx.lineTo(w,h*0.55); ctx.fill();
  // Near mountains — green-grey
  ctx.fillStyle='#4a7055';
  ctx.beginPath(); ctx.moveTo(0,h*0.65);
  ctx.lineTo(w*0.15,h*0.38); ctx.lineTo(w*0.3,h*0.52);
  ctx.lineTo(w*0.5,h*0.3); ctx.lineTo(w*0.68,h*0.48);
  ctx.lineTo(w*0.85,h*0.35); ctx.lineTo(w,h*0.5);
  ctx.lineTo(w,h*0.65); ctx.fill();
  // Treeline
  ctx.fillStyle='#1e4d28';
  for(let i=0;i<18;i++){
    const tx=i*w/17, ty=h*0.64, ts=h*0.1+Math.random()*h*0.05;
    ctx.beginPath(); ctx.moveTo(tx,ty);
    ctx.lineTo(tx-ts*0.3,ty+ts); ctx.lineTo(tx+ts*0.3,ty+ts); ctx.fill();
  }
  // Meadow
  g = ctx.createLinearGradient(0,h*0.72,0,h);
  g.addColorStop(0,'#4a8c3a'); g.addColorStop(1,'#2a5c20');
  ctx.fillStyle=g; ctx.fillRect(0,h*0.72,w,h*0.28);
  // Wild flowers
  ['#f0e040','#e060a0','#60c0e0','#f09020'].forEach((col,ci)=>{
    ctx.fillStyle=col;
    for(let i=0;i<12;i++){
      const fx=(i*37+ci*61)%w, fy=h*0.76+(i*29+ci*17)%( h*0.18);
      ctx.beginPath(); ctx.arc(fx,fy,3,0,Math.PI*2); ctx.fill();
    }
  });
}

function paintWinterMountains(ctx, w, h) {
  // Cold sky
  let g = ctx.createLinearGradient(0,0,0,h*0.5);
  g.addColorStop(0,'#1a2a4a'); g.addColorStop(1,'#b8d0e8');
  ctx.fillStyle=g; ctx.fillRect(0,0,w,h*0.5);
  // Mountains
  ctx.fillStyle='#6a8098';
  ctx.beginPath(); ctx.moveTo(0,h*0.6);
  ctx.lineTo(w*0.12,h*0.25); ctx.lineTo(w*0.28,h*0.42);
  ctx.lineTo(w*0.45,h*0.15); ctx.lineTo(w*0.6,h*0.38);
  ctx.lineTo(w*0.78,h*0.2); ctx.lineTo(w*0.92,h*0.4);
  ctx.lineTo(w,h*0.3); ctx.lineTo(w,h*0.6); ctx.fill();
  // Snow caps
  ctx.fillStyle='#eef4ff';
  function snowCap(px,py,pw){
    ctx.beginPath(); ctx.moveTo(px,py);
    ctx.lineTo(px-pw*0.4,py+pw*0.55);
    ctx.lineTo(px+pw*0.4,py+pw*0.55); ctx.fill();
  }
  snowCap(w*0.12,h*0.25,h*0.14);
  snowCap(w*0.45,h*0.15,h*0.18);
  snowCap(w*0.78,h*0.2,h*0.15);
  // Frozen lake / snow ground
  g = ctx.createLinearGradient(0,h*0.58,0,h);
  g.addColorStop(0,'#d8eaf8'); g.addColorStop(1,'#b0cce0');
  ctx.fillStyle=g; ctx.fillRect(0,h*0.58,w,h*0.42);
  // Lake sheen
  ctx.fillStyle='rgba(160,210,240,0.5)';
  ctx.beginPath(); ctx.ellipse(w*0.5,h*0.75,w*0.38,h*0.1,0,0,Math.PI*2); ctx.fill();
  // Snow-covered pines
  ctx.fillStyle='#2a4a2a';
  for(let i=0;i<10;i++){
    const tx=i*w/9, ty=h*0.6, ts=h*0.1;
    ctx.beginPath(); ctx.moveTo(tx,ty);
    ctx.lineTo(tx-ts*0.3,ty+ts); ctx.lineTo(tx+ts*0.3,ty+ts); ctx.fill();
  }
  ctx.fillStyle='rgba(240,248,255,0.8)';
  for(let i=0;i<10;i++){
    const tx=i*w/9, ty=h*0.6, ts=h*0.07;
    ctx.beginPath(); ctx.moveTo(tx,ty);
    ctx.lineTo(tx-ts*0.3,ty+ts*0.5); ctx.lineTo(tx+ts*0.3,ty+ts*0.5); ctx.fill();
  }
  // Snowflake specks
  ctx.fillStyle='rgba(255,255,255,0.7)';
  for(let i=0;i<40;i++){
    const sx=(i*97)%w, sy=(i*61)%(h*0.55);
    ctx.beginPath(); ctx.arc(sx,sy,1.2,0,Math.PI*2); ctx.fill();
  }
}

function paintSlotCanyon(ctx, w, h) {
  // Dark base
  ctx.fillStyle='#1a0a05'; ctx.fillRect(0,0,w,h);
  // Canyon walls — layered warm bands
  const bands=[
    ['#6b2010',0,0.15],['#8b3518',0.15,0.28],['#a04520',0.28,0.42],
    ['#b85a2a',0.42,0.56],['#cc7035',0.56,0.68],['#8b3518',0.68,0.82],['#4a1808',0.82,1],
  ];
  bands.forEach(([col,s,e])=>{
    ctx.fillStyle=col;
    const yStart=h*s, yEnd=h*e;
    // Wavy canyon wall shape
    ctx.beginPath();
    ctx.moveTo(0,yStart);
    ctx.bezierCurveTo(w*0.1,yStart+4, w*0.2,yStart-4, w*0.3,yStart+2);
    ctx.bezierCurveTo(w*0.4,yStart-3, w*0.5,yStart+5, w,yStart);
    ctx.lineTo(w,yEnd);
    ctx.bezierCurveTo(w*0.5,yEnd+3, w*0.3,yEnd-3, 0,yEnd);
    ctx.fill();
  });
  // Light beam from top
  let g = ctx.createRadialGradient(w*0.5,0,0, w*0.5,h*0.3,w*0.4);
  g.addColorStop(0,'rgba(255,220,150,0.6)');
  g.addColorStop(0.5,'rgba(255,180,80,0.2)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g; ctx.fillRect(0,0,w,h*0.6);
  // Narrow sky slit at top
  g = ctx.createLinearGradient(0,0,0,h*0.12);
  g.addColorStop(0,'#a0c8f0'); g.addColorStop(1,'rgba(100,160,220,0)');
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.moveTo(w*0.3,0); ctx.lineTo(w*0.7,0);
  ctx.bezierCurveTo(w*0.65,h*0.1, w*0.55,h*0.15, w*0.5,h*0.18);
  ctx.bezierCurveTo(w*0.45,h*0.15, w*0.35,h*0.1, w*0.3,0);
  ctx.fill();
  // Dust particles in beam
  ctx.fillStyle='rgba(255,220,150,0.6)';
  for(let i=0;i<25;i++){
    const px=w*0.35+(i*47)%(w*0.3), py=(i*61)%(h*0.55);
    ctx.beginPath(); ctx.arc(px,py,1.5,0,Math.PI*2); ctx.fill();
  }
  // Floor — sandy
  g = ctx.createLinearGradient(0,h*0.82,0,h);
  g.addColorStop(0,'#8b5a28'); g.addColorStop(1,'#4a2a08');
  ctx.fillStyle=g; ctx.fillRect(0,h*0.82,w,h*0.18);
}

function paintTulips(ctx, w, h) {
  // Sky
  let g = ctx.createLinearGradient(0,0,0,h*0.38);
  g.addColorStop(0,'#4a90d9'); g.addColorStop(1,'#b8d8f0');
  ctx.fillStyle=g; ctx.fillRect(0,0,w,h*0.38);
  // Clouds
  ctx.fillStyle='rgba(255,255,255,0.9)';
  [[w*0.15,h*0.08,35],[w*0.55,h*0.06,45],[w*0.82,h*0.1,28]].forEach(([cx,cy,r])=>{
    [[-r*0.6,0,r*0.65],[0,-r*0.4,r],[r*0.6,0,r*0.65]].forEach(([dx,dy,rad])=>{
      ctx.beginPath(); ctx.arc(cx+dx,cy+dy,rad,0,Math.PI*2); ctx.fill();
    });
  });
  // Windmill silhouette (classic Dutch)
  const mx=w*0.78, my=h*0.38;
  ctx.fillStyle='#2a2a3a';
  // Tower
  ctx.beginPath();
  ctx.moveTo(mx-w*0.04,my); ctx.lineTo(mx+w*0.04,my);
  ctx.lineTo(mx+w*0.025,my-h*0.2); ctx.lineTo(mx-w*0.025,my-h*0.2);
  ctx.fill();
  // Blades
  ctx.strokeStyle='#2a2a3a'; ctx.lineWidth=4;
  for(let a=0;a<4;a++){
    const ang=a*Math.PI/2 + Math.PI/6;
    ctx.beginPath();
    ctx.moveTo(mx,my-h*0.2);
    ctx.lineTo(mx+Math.cos(ang)*h*0.14, my-h*0.2+Math.sin(ang)*h*0.14);
    ctx.stroke();
  }
  // Tulip rows — alternating colors
  const rowColors=[['#e82020','#c01010'],['#f0a000','#c07800'],['#e020c0','#a00090'],
                   ['#f04040','#c82020'],['#f8c000','#d09000'],['#c030d0','#9010a0']];
  for(let row=0;row<6;row++){
    const ry=h*(0.4+row*0.1), [mainCol,darkCol]=rowColors[row%rowColors.length];
    // Stem strip
    ctx.fillStyle='#2a7a20';
    ctx.fillRect(0,ry+h*0.04,w,h*0.05);
    // Flower heads
    const count=Math.round(w/22);
    for(let i=0;i<count;i++){
      const fx=i*(w/count)+w/(count*2);
      // Petal
      ctx.fillStyle=mainCol;
      ctx.beginPath();
      ctx.ellipse(fx,ry+h*0.02,7,h*0.05,0,0,Math.PI*2); ctx.fill();
      // Highlight
      ctx.fillStyle='rgba(255,255,255,0.25)';
      ctx.beginPath();
      ctx.ellipse(fx-2,ry,3,h*0.025,-0.3,0,Math.PI*2); ctx.fill();
    }
  }
}

// Render all 6 scenes to 300×300 canvases and convert to data URLs
const painters = [paintDesert, paintBeach, paintSummerMountains,
                  paintWinterMountains, paintSlotCanyon, paintTulips];
const FACE_DATA_URLS = painters.map(fn => {
  const c = document.createElement('canvas');
  c.width = c.height = 300;
  fn(c.getContext('2d'), 300, 300);
  return c.toDataURL('image/jpeg', 0.85);
});

// ── Cube setup ────────────────────────────────────────────────────────────
const S=160, SCENE_SIZE=360, OFFSET=(SCENE_SIZE-S)/2;
const ANIM_MS=400, DRAG_THRESHOLD=8;
const FACE_MIN=OFFSET+10, FACE_MAX=OFFSET+S-10;
const F={F:0,B:1,L:2,R:3,U:4,D:5};

const FACE_XFORMS=[
  `translateZ(${S/2}px)`,
  `rotateY(180deg) translateZ(${S/2}px)`,
  `rotateY(-90deg) translateZ(${S/2}px)`,
  `rotateY(90deg) translateZ(${S/2}px)`,
  `rotateX(90deg) translateZ(${S/2}px)`,
  `rotateX(-90deg) translateZ(${S/2}px)`,
];

function solved(){
  return Array.from({length:6},(_,f)=>Array.from({length:3},()=>Array(3).fill(f)));
}
let state=solved();

const cubeEl=document.getElementById('cube');
const scene=document.getElementById('scene');
const statusEl=document.getElementById('status');
const faceEls=[], cellEls=[];

for(let f=0;f<6;f++){
  const face=document.createElement('div');
  face.className='face';
  face.style.left=OFFSET+'px'; face.style.top=OFFSET+'px';
  face.style.transform=FACE_XFORMS[f];
  const cells=[];
  for(let i=0;i<9;i++){
    const cell=document.createElement('div');
    cell.className='cell'; face.appendChild(cell); cells.push(cell);
  }
  cubeEl.appendChild(face); faceEls.push(face); cellEls.push(cells);
}

function render(){
  for(let f=0;f<6;f++)
    for(let r=0;r<3;r++)
      for(let c=0;c<3;c++){
        const cell=cellEls[f][r*3+c];
        const src=state[f][r][c];
        cell.style.backgroundImage=`url(${FACE_DATA_URLS[src]})`;
        cell.style.backgroundSize='300% 300%';
        cell.style.backgroundPosition=`${c*50}% ${r*50}%`;
      }
}
render();

// ── State mutations ───────────────────────────────────────────────────────
function rotateCW(f){
  const s=state[f];
  state[f]=[[s[2][0],s[1][0],s[0][0]],[s[2][1],s[1][1],s[0][1]],[s[2][2],s[1][2],s[0][2]]];
}
function rotateCCW(f){rotateCW(f);rotateCW(f);rotateCW(f);}
function cycle(groups,rev){
  const vals=groups.map(g=>g.map(([f,r,c])=>state[f][r][c]));
  const order=rev?[1,2,3,0]:[3,2,1,0];
  for(let g=0;g<4;g++){
    const to=groups[g],from=vals[order[g]];
    to.forEach(([f,r,c],i)=>{state[f][r][c]=from[i];});
  }
}
function doMove(name,rev){
  switch(name){
    case'U': rev?rotateCCW(F.U):rotateCW(F.U);
      cycle([[[F.F,0,0],[F.F,0,1],[F.F,0,2]],[[F.R,0,0],[F.R,0,1],[F.R,0,2]],
             [[F.B,0,0],[F.B,0,1],[F.B,0,2]],[[F.L,0,0],[F.L,0,1],[F.L,0,2]]],rev);break;
    case'D': rev?rotateCCW(F.D):rotateCW(F.D);
      cycle([[[F.F,2,0],[F.F,2,1],[F.F,2,2]],[[F.L,2,0],[F.L,2,1],[F.L,2,2]],
             [[F.B,2,0],[F.B,2,1],[F.B,2,2]],[[F.R,2,0],[F.R,2,1],[F.R,2,2]]],rev);break;
    case'M':
      cycle([[[F.F,1,0],[F.F,1,1],[F.F,1,2]],[[F.R,1,0],[F.R,1,1],[F.R,1,2]],
             [[F.B,1,0],[F.B,1,1],[F.B,1,2]],[[F.L,1,0],[F.L,1,1],[F.L,1,2]]],rev);break;
    case'R': rev?rotateCCW(F.R):rotateCW(F.R);
      cycle([[[F.F,0,2],[F.F,1,2],[F.F,2,2]],[[F.U,0,2],[F.U,1,2],[F.U,2,2]],
             [[F.B,2,0],[F.B,1,0],[F.B,0,0]],[[F.D,0,2],[F.D,1,2],[F.D,2,2]]],rev);break;
    case'L': rev?rotateCCW(F.L):rotateCW(F.L);
      cycle([[[F.F,0,0],[F.F,1,0],[F.F,2,0]],[[F.D,0,0],[F.D,1,0],[F.D,2,0]],
             [[F.B,2,2],[F.B,1,2],[F.B,0,2]],[[F.U,0,0],[F.U,1,0],[F.U,2,0]]],rev);break;
    case'S':
      cycle([[[F.F,0,1],[F.F,1,1],[F.F,2,1]],[[F.D,0,1],[F.D,1,1],[F.D,2,1]],
             [[F.B,2,1],[F.B,1,1],[F.B,0,1]],[[F.U,0,1],[F.U,1,1],[F.U,2,1]]],rev);break;
  }
}

// ── Animation ─────────────────────────────────────────────────────────────
let animating=false;
const MOVE_ANIM={
  U:{axis:'Y',layer:'row',idx:0,sign:1}, M:{axis:'Y',layer:'row',idx:1,sign:1},
  D:{axis:'Y',layer:'row',idx:2,sign:-1},R:{axis:'X',layer:'col',idx:2,sign:-1},
  S:{axis:'X',layer:'col',idx:1,sign:-1},L:{axis:'X',layer:'col',idx:0,sign:1},
};

function animateMove(name,rev,onDone){
  const info=MOVE_ANIM[name], angle=(rev?-1:1)*info.sign*90;
  const overlay=document.createElement('div');
  overlay.style.cssText=`position:absolute;width:${S}px;height:${S}px;left:${OFFSET}px;top:${OFFSET}px;transform-style:preserve-3d;pointer-events:none;`;
  for(let f=0;f<6;f++){
    const strip=document.createElement('div');
    strip.style.cssText=`position:absolute;width:${S}px;height:${S}px;transform:${FACE_XFORMS[f]};display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:4px;pointer-events:none;`;
    for(let r=0;r<3;r++) for(let c=0;c<3;c++){
      const cell=document.createElement('div');
      cell.style.borderRadius='3px';
      const inLayer=(info.layer==='row'&&r===info.idx)||(info.layer==='col'&&c===info.idx);
      if(inLayer){
        const src=state[f][r][c];
        cell.style.backgroundImage=`url(${FACE_DATA_URLS[src]})`;
        cell.style.backgroundSize='300% 300%';
        cell.style.backgroundPosition=`${c*50}% ${r*50}%`;
        cell.style.backgroundRepeat='no-repeat';
      }
      strip.appendChild(cell);
    }
    overlay.appendChild(strip);
  }
  for(let f=0;f<6;f++) for(let r=0;r<3;r++) for(let c=0;c<3;c++){
    const inLayer=(info.layer==='row'&&r===info.idx)||(info.layer==='col'&&c===info.idx);
    if(inLayer) cellEls[f][r*3+c].style.opacity='0';
  }
  cubeEl.appendChild(overlay);
  const t0=performance.now();
  (function tick(now){
    const p=Math.min(1,(now-t0)/ANIM_MS), ease=p<0.5?2*p*p:-1+(4-2*p)*p;
    overlay.style.transform=info.axis==='Y'?`rotateY(${angle*ease}deg)`:`rotateX(${angle*ease}deg)`;
    if(p<1){ requestAnimationFrame(tick); }
    else{
      cubeEl.removeChild(overlay); doMove(name,rev);
      for(let f=0;f<6;f++) for(let i=0;i<9;i++) cellEls[f][i].style.opacity='1';
      render(); onDone&&onDone();
    }
  })(t0);
}

// ── Orbit ─────────────────────────────────────────────────────────────────
let rotX=-30, rotY=30;
function applyOrbit(){ cubeEl.style.transform=`rotateX(${rotX}deg) rotateY(${rotY}deg)`; }
function frontFace(){
  const ry=((rotY%360)+360)%360;
  if(rotX<-45) return F.U; if(rotX>45) return F.D;
  if(ry>=315||ry<45) return F.F; if(ry>=45&&ry<135) return F.R;
  if(ry>=135&&ry<225) return F.B; return F.L;
}

// ── Drag → move ───────────────────────────────────────────────────────────
function resolveMove(face,axis,li,dir){
  if(axis==='h') return{name:['U','M','D'][li],rev:li===2?dir>0:dir<0};
  if(face===F.F||face===F.U||face===F.D) return{name:['L','S','R'][li],rev:li===2?dir<0:dir>0};
  if(face===F.B) return{name:['R','S','L'][li],rev:li===2?dir>0:dir<0};
  if(face===F.R) return{name:['U','M','D'][li],rev:dir<0};
  return{name:['D','M','U'][li],rev:dir>0};
}

let drag=null;
scene.addEventListener('pointerdown',e=>{
  if(animating) return;
  scene.setPointerCapture(e.pointerId);
  const rect=scene.getBoundingClientRect();
  drag={sx:e.clientX,sy:e.clientY,px:e.clientX-rect.left,py:e.clientY-rect.top,
        committed:false,mode:null,axis:null,layerIdx:null,face:null};
  scene.style.cursor='grabbing';
});
scene.addEventListener('pointermove',e=>{
  if(!drag) return;
  const dx=e.clientX-drag.sx, dy=e.clientY-drag.sy;
  if(Math.sqrt(dx*dx+dy*dy)<DRAG_THRESHOLD) return;
  if(!drag.committed){
    drag.committed=true;
    const onFace=drag.px>=FACE_MIN&&drag.px<=FACE_MAX&&drag.py>=FACE_MIN&&drag.py<=FACE_MAX;
    if(!onFace){ drag.mode='orbit'; }
    else{
      drag.mode='twist'; drag.axis=Math.abs(dx)>=Math.abs(dy)?'h':'v';
      drag.face=frontFace();
      const frac=drag.axis==='h'?(drag.py-OFFSET)/S:(drag.px-OFFSET)/S;
      drag.layerIdx=Math.min(2,Math.max(0,Math.floor(frac*3)));
    }
  }
  if(drag.mode==='orbit'){
    rotY+=dx*0.4; rotX=Math.max(-80,Math.min(80,rotX+dy*0.4));
    drag.sx=e.clientX; drag.sy=e.clientY; applyOrbit();
  }
});
scene.addEventListener('pointerup',e=>{
  if(!drag) return;
  if(drag.committed&&drag.mode==='twist'){
    const dx=e.clientX-drag.sx, dy=e.clientY-drag.sy;
    const dir=drag.axis==='h'?(dx>0?1:-1):(dy>0?1:-1);
    const{name,rev}=resolveMove(drag.face,drag.axis,drag.layerIdx,dir);
    animating=true; statusEl.textContent=name+(rev?'\'':'');
    animateMove(name,rev,()=>{animating=false;statusEl.textContent='';});
  }
  drag=null; scene.style.cursor='grab';
});
window.addEventListener('pointerup',()=>{ if(drag){drag=null;scene.style.cursor='grab';} });

// ── Shuffle & Reset ───────────────────────────────────────────────────────
const MOVE_NAMES=['U','D','L','R','M','S'];
function runSeq(moves,i){
  if(i>=moves.length){animating=false;statusEl.textContent='';return;}
  animating=true;
  const{name,rev}=moves[i]; statusEl.textContent=name+(rev?'\'':'');
  animateMove(name,rev,()=>runSeq(moves,i+1));
}
document.getElementById('btn-shuffle').addEventListener('click',()=>{
  if(animating) return;
  runSeq(Array.from({length:14},()=>({name:MOVE_NAMES[Math.floor(Math.random()*6)],rev:Math.random()>0.5})),0);
});
document.getElementById('btn-reset').addEventListener('click',()=>{
  if(animating) return; state=solved(); render();
});

})();
</script>
